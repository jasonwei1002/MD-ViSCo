# ============================================================================
# PPG2ABP Refinement Model (MultiResUNet1D) – Unified Configuration
# ============================================================================
# Paper: PPG2ABP: Translating Photoplethysmogram (PPG) Signals to Arterial Blood Pressure (ABP) Waveforms... (arXiv:2005.01669v2, §3.3)
# Validation: Validated 2026-01-29
# Datasets: UCI (1024) | PulseDB (1280)
#
# Params set here (source):
#   input_length → dataset via Hydra
#
# Notes:
#   - alpha=2.5 from base_multires_unet_1d (paper §3.3); override to alpha=10 for larger capacity
#   - Alpha controls MultiRes block width: W = alpha × U
#
# Usage:
#   torchrun --module src.train -m model@trainer.model=ppg2abp_refinement trainer=refinement_trainer train_dataset=train_uci_refinement_abp test_dataset=test_uci_refinement_abp
# ============================================================================

defaults:
  - base_multires_unet_1d
  - /checkpoint_io@checkpoint_io: checkpoint_io
  - _self_

# Model architecture parameters
input_length: ${oc.select:train_dataset.input_size,${test_dataset.input_size}}  # Dynamically adapts to dataset with fallback
