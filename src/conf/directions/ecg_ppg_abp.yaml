# ============================================================================
# ECG-PPG-ABP Multi-Direction Configuration
# ============================================================================
#
# Purpose:
#   Comprehensive multi-direction configuration for ECG, PPG, and ABP waveform
#   transformations. Defines all possible direction mappings between these
#   three signal types, enabling models to learn transformations across all
#   combinations.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Multi-direction configuration: All combinations of PPG, ECG, and ABP
#   - Includes: PPG→ECG, PPG→ABP, ECG→PPG, ECG→ABP, ABP→PPG, ABP→ECG
#   - Used for comprehensive multi-direction training
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [PPG]
    target: ECG
  - _target_: src.core.domain.Direction
    source: [PPG]
    target: ABP
  - _target_: src.core.domain.Direction
    source: [ECG]
    target: PPG
  - _target_: src.core.domain.Direction
    source: [ECG]
    target: ABP
  - _target_: src.core.domain.Direction
    source: [ABP]
    target: PPG
  - _target_: src.core.domain.Direction
    source: [ABP]
    target: ECG
