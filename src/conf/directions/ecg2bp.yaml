# ============================================================================
# ECG to BP Direction Configuration
# ============================================================================
#
# Purpose:
#   Single-source direction configuration for ECG to BP (Blood Pressure) scalar
#   estimation. Enables BPModel to use only ECG signal for blood pressure
#   estimation (SBP, DBP, MAP) in scalar regression tasks.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Single-source direction: ECG → BP (scalar)
#   - Used for scalar blood pressure estimation tasks
#   - BPModel creates a single encoder for ECG signal
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [ECG]
    target: BP

