# ============================================================================
# ECG to IMP Direction Configuration
# ============================================================================
#
# Purpose:
#   Direction configuration for ECG to IMP (Impedance) waveform transformation.
#   Defines a single-direction mapping from ECG source signals to IMP target
#   waveforms for model training and inference.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Single-source direction: ECG → IMP
#   - Used for waveform reconstruction tasks with impedance signals
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [ECG]
    target: IMP
