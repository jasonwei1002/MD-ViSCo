# ============================================================================
# IMP to ECG Direction Configuration
# ============================================================================
#
# Purpose:
#   Direction configuration for IMP (Impedance) to ECG waveform transformation.
#   Defines a single-direction mapping from IMP source signals to ECG target
#   waveforms for model training and inference.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Single-source direction: IMP → ECG
#   - Used for waveform reconstruction tasks with impedance signals
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [IMP]
    target: ECG
