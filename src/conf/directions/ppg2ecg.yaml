# ============================================================================
# PPG to ECG Direction Configuration
# ============================================================================
#
# Purpose:
#   Direction configuration for PPG (Photoplethysmography) to ECG waveform
#   transformation. Defines a single-direction mapping from PPG source signals
#   to ECG target waveforms for model training and inference.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Single-source direction: PPG → ECG
#   - Used for waveform reconstruction tasks
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [PPG]
    target: ECG
