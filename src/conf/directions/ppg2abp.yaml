# ============================================================================
# PPG to ABP Direction Configuration
# ============================================================================
#
# Purpose:
#   Direction configuration for PPG to ABP (Arterial Blood Pressure) waveform
#   transformation. Defines a single-direction mapping from PPG source signals
#   to ABP target waveforms for model training and inference.
#
# Inherits:
#   - base_directions: Base direction configuration from ConfigStore
#
# Notes:
#   - Single-source direction: PPG → ABP
#   - Used for waveform reconstruction tasks
#
# ============================================================================

defaults:
  - base_directions
  - _self_

active_directions:
  - _target_: src.core.domain.Direction
    source: [PPG]
    target: ABP