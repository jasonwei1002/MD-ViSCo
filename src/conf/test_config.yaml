# ============================================================================
# MD-ViSCo Evaluation Configuration
# ============================================================================
#
# Purpose:
#   Main entry point configuration for `python -m src.test`. Composes
#   base_config and defines a default test_dataset + evaluator pair so the
#   eval scripts only need to override the parts they care about
#   (evaluator, test_dataset, checkpoint_epoch, ...).
#
# Inherits:
#   - base_config: Root Config schema from ConfigStore (src/conf/__init__.py)
#   - test_dataset: Test dataset configuration (default: test_uci)
#   - evaluator:    Evaluator configuration (default: waveform_reconstruction_evaluator)
#
# Notes:
#   - train_dataset and trainer are intentionally left null. The test entry
#     point only reads cfg.test_dataset and cfg.evaluator.
#   - Override defaults from the CLI, e.g.:
#       python -m src.test \
#         evaluator=waveform_reconstruction_evaluator \
#         test_dataset=test_pulsedb \
#         evaluator.checkpoint_epoch=100
#
# ============================================================================

defaults:
  - base_config
  - test_dataset: test_uci
  - evaluator: waveform_reconstruction_evaluator
  - _self_

train_dataset: null
trainer: null
