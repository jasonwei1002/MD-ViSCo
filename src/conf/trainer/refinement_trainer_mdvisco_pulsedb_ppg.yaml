# ============================================================================
# MD-ViSCo Refinement Trainer – PulseDB Full, SINGLE-SOURCE PPG
# ============================================================================
# Single-source variant: trains BP refinement from PPG ALONE (one direction
# [PPG]->BP, direction_mode=single). Uses the single-encoder model
# mdvisco_refinement_pulsedb_ppg and restricts input_preprocessing.source to ppg
# only, so ECG is never loaded, encoded, or contrasted. WCL keeps only its `ppg_*`
# and `text_*` terms — the `ecg_*` terms self-skip on the missing `ecg_embeddings`
# key (MultiWeightedContrastiveLoss.forward).
#
# Variant family (pick by deployment / paper setting):
#   - _pulsedb       : ONE multi-source direction [PPG,ECG]->BP   (both required)
#   - _pulsedb_dual  : TWO single-source directions PPG->BP+ECG->BP (multi)
#   - _pulsedb_ppg   : THIS — PPG only
#   - _pulsedb_ecg   : ECG only
#
# Standalone (not inheriting _pulsedb) so `override /directions@directions:`
# composes cleanly off base_refinement_scalar on Hydra 1.3.x (avoids the documented
# "Multiple values for directions@trainer.directions" conflict).
#
# Mandatory on the command line: trainer.use_patient_information=true
# Paper recipe also sets:        trainer.use_wcl=true
# ============================================================================

defaults:
  - base_refinement_scalar
  - /model@model: mdvisco_refinement_pulsedb_ppg
  - /input_preprocessor@demographics_text_encoder: demographics_text_encoder
  # Override entries must come AFTER all append entries (Hydra 1.3.x ordering).
  - override /directions@directions: ppg2bp
  - _self_

trainer_name: MDViSCoRef

# One active direction ([PPG]->BP) => direction_mode stays "single" (the trainer
# dataclass default). Do NOT set it to multi, or train.py::validate_config raises
# "direction_mode is 'multi', but only one direction is provided".

num_epochs: 60

input_preprocessing:
  source:
    - vital: "ppg"
      norm: "minmax_zc"
  target:
    - vital: "bp"
      norm: "global_minmax"
  include:
    - bp_raw
    - age_raw
    - gender_raw
    - height_raw
    - weight_raw
    - bmi_raw
