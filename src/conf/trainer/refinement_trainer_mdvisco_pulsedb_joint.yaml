# ============================================================================
# MD-ViSCo Refinement Trainer – PulseDB Full, PAPER-HEADLINE (joint two-branch)
# ============================================================================
# Reproduces the paper's headline BP refinement (§III.D): jointly train the ECG
# and PPG single-source branches with BOTH signals present per sample, supervise
# each branch INDEPENDENTLY, and SUM the per-branch MAEs (L_MAE summed over
# i in {ECG, PPG}); infer from a single modality.
#
# How it differs from the siblings:
#   - direction = ppg2bp_ecg2bp = ONE multi-source direction [PPG,ECG]->BP
#     (direction_mode=single). This routes correctly per-vital: every sample runs
#     BOTH encoders (PPG->ppg encoder, ECG->ecg encoder), unlike `_dual`
#     (direction_mode=multi), which BPModel mis-handles (mixed batch keyed off
#     directions[0] -> cross-modality contamination; BPModel.supports_multi_directional=False).
#   - criterion = regression_multi_wcl_pervital: the regression term is the
#     per-vital summed MAE (multi_branch_l1_loss) instead of MAE on BPModel's
#     AVERAGED prediction (the stock regression_multi_wcl, = Appendix-E ablation
#     that degrades under single-modality inference). WCL terms are unchanged
#     (already per-vital).
#
# Standalone (not inheriting _pulsedb) so the directions/criterion overrides
# compose cleanly off base_refinement_scalar on Hydra 1.3.x.
#
# Mandatory on the command line: trainer.use_patient_information=true
# Paper recipe also sets:        trainer.use_wcl=true
# Loss hyperparameters already match the paper (Table X): lambda_MAE=0.001 is baked
# in below; the WCL terms (multi_wcl_loss) carry tau_s/T_s/tau_w and lambda1=lambda2=0.01.
# ============================================================================

defaults:
  - base_refinement_scalar
  - /model@model: mdvisco_refinement_pulsedb
  - /input_preprocessor@demographics_text_encoder: demographics_text_encoder
  # Override entries must come AFTER all append entries (Hydra 1.3.x ordering).
  - override /directions@directions: ppg2bp_ecg2bp
  - override /criterion@criterion: regression_multi_wcl_pervital
  - _self_

trainer_name: MDViSCoRef

# One active multi-source direction ([PPG,ECG]->BP) => direction_mode stays
# "single" (the trainer dataclass default). Do NOT set it to multi.

num_epochs: 60

# Paper lambda_MAE = 0.001 (Table X): weight the per-vital summed MAE so it
# balances against the WCL terms (lambda1=lambda2=0.01) exactly as in the paper.
# Merged onto the composed regression_multi_wcl_pervital criterion via _self_.
criterion:
  regression_loss_term:
    scale_factor: 0.001

input_preprocessing:
  source:
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "ecg"
      norm: "minmax_zc"
  target:
    - vital: "bp"
      norm: "global_minmax"
  include:
    - bp_raw
    - age_raw
    - gender_raw
    - height_raw
    - weight_raw
    - bmi_raw
