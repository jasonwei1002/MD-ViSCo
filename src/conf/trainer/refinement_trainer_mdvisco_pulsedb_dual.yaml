# ============================================================================
# MD-ViSCo Refinement Trainer – PulseDB Full, PAPER-HEADLINE directions
# ============================================================================
# Identical to refinement_trainer_mdvisco_pulsedb EXCEPT it selects the
# *two single-source* directions config `ppg2bp_ecg2bp_dual` (PPG->BP + ECG->BP,
# direction_mode=multi) instead of the multi-source `ppg2bp_ecg2bp` ([PPG,ECG]->BP).
#
# This reproduces the paper's headline BP refinement (§III.D): two single-source
# branches jointly trained, single-modality inference. The multi-source variant is
# the Appendix-E ablation. See CLAUDE.md "paper-recipe".
#
# Standalone (not inheriting _pulsedb) so the `override /directions@directions:`
# composes cleanly off base_refinement_scalar on Hydra 1.3.x (avoids the documented
# "Multiple values for directions@trainer.directions" conflict).
#
# Mandatory on the command line: trainer.use_patient_information=true
# Paper recipe also sets:        trainer.use_wcl=true
# ============================================================================

defaults:
  - base_refinement_scalar
  - /model@model: mdvisco_refinement_pulsedb
  - /input_preprocessor@demographics_text_encoder: demographics_text_encoder
  # Override entries must come AFTER all append entries (Hydra 1.3.x ordering).
  - override /directions@directions: ppg2bp_ecg2bp_dual
  - _self_

trainer_name: MDViSCoRef

# Two active directions (PPG->BP, ECG->BP) => must declare multi, or train.py
# validate_config raises "direction_mode is 'single', but multiple directions...".
direction_mode: multi

num_epochs: 60

input_preprocessing:
  source:
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "ecg"
      norm: "minmax_zc"
  target:
    - vital: "bp"
      norm: "global_minmax"
  include:
    - bp_raw
    - age_raw
    - gender_raw
    - height_raw
    - weight_raw
    - bmi_raw
