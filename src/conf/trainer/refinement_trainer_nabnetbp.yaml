# ============================================================================
# NABNet BP Refinement Trainer Configuration
# ============================================================================
#
# Purpose:
#   Trainer configuration for NABNet BP refinement (second-stage) training.
#   Fine-tunes NABNet refinement model to predict blood pressure scalars from
#   waveforms using multi-weighted contrastive loss.
#
# Inherits:
#   - base_refinement_scalar: Base scalar refinement trainer configuration
#   - model: nabnet_refinement (NABNet refinement model)
#
# Notes:
#   - Scheduler disabled (scheduler: null) for fixed learning rate
#   - Batch size: 32 (optimized for NABNet architecture)
#   - Early stopping patience: 20 epochs
#   - Fine-tunes from approximation checkpoints
#   - Optimized for blood pressure scalar prediction
#
# ============================================================================

defaults:
  - base_refinement_scalar
  - /model@model: nabnet_refinement
  - _self_


scheduler: null

batch_size: 32

early_stopping:
  patience: 20

# Usage Examples
# ============================================================================
# 1. Basic training:
#    python -m src.train trainer=refinement_trainer_nabnetbp \
#      train_dataset=train_uci_refinement_bp \
#      checkpoint_managers.load.base_dir=/path/to/approximation/checkpoints
#
# 2. Override direction:
#    python -m src.train trainer=refinement_trainer_nabnetbp \
#      directions@trainer.directions=ecg2abp
#
# 3. Override training parameters:
#    python -m src.train trainer=refinement_trainer_nabnetbp \
#      batch_size=64 \
#      early_stopping.patience=30
#
# 4. Override checkpoint loading:
#    python -m src.train trainer=refinement_trainer_nabnetbp \
#      checkpoint_managers.load.base_dir=/custom/path \
#      checkpoint_managers.load.trainer_name=WaveRecApp
# ============================================================================
