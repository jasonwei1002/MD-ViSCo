# ============================================================================
# GAN Refinement Trainer Configuration (P2E-WGAN)
# ============================================================================
#
# Purpose:
#   Trainer configuration for P2E-WGAN refinement (second-stage) training.
#   Fine-tunes P2E-WGAN generator to improve waveform quality from initial
#   approximations using Wasserstein GAN with gradient penalty loss.
#
# Inherits:
#   - base_refinement_waveform: Base waveform refinement trainer configuration
#   - base_gan_trainer: Base GAN trainer configuration
#   - model: p2ewgan (P2E-WGAN model)
#   - criterion: wgan_gp_loss (Wasserstein GAN with gradient penalty)
#
# Notes:
#   - Trainer name: WaveRecRef
#   - n_critic: 3 (number of discriminator updates per generator update)
#   - Batch size: 192 (larger batch size for GAN training stability)
#   - Number of epochs: 25 (typically fewer epochs needed for GANs)
#   - Early stopping disabled (early_stopping: null)
#   - Scheduler disabled (scheduler: null)
#   - is_finetuning: true (fine-tunes from approximation checkpoints)
#
# ============================================================================

defaults:
  - base_refinement_waveform
  - base_gan_trainer
  - /model@model: p2ewgan
  - override /criterion@criterion: wgan_gp_loss
  - _self_

trainer_name: WaveRecRef
n_critic: 3
batch_size: 192
num_epochs: 25
early_stopping: null
scheduler: null
is_finetuning: true

# Usage Examples
# ============================================================================
# 1. Basic training:
#    python -m src.train trainer=refinement_trainer_gan \
#      train_dataset=train_uci_refinement_abp \
#      checkpoint_managers.load.base_dir=/path/to/approximation/checkpoints
#
# 2. Override direction:
#    python -m src.train trainer=refinement_trainer_gan \
#      directions@trainer.directions=ecg2abp
#
# 3. Override GAN-specific parameters:
#    python -m src.train trainer=refinement_trainer_gan \
#      n_critic=5 \
#      batch_size=128 \
#      num_epochs=50
#
# 4. Override checkpoint loading:
#    python -m src.train trainer=refinement_trainer_gan \
#      checkpoint_managers.load.base_dir=/custom/path \
#      checkpoint_managers.load.trainer_name=WaveRecApp
# ============================================================================
