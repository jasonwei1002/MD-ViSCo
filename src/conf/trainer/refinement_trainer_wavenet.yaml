# ============================================================================
# WaveNet Refinement Trainer Configuration
# ============================================================================
#
# Purpose:
#   Trainer configuration for WaveNet refinement (second-stage) training.
#   Fine-tunes WaveNet model to improve waveform quality from initial
#   approximations using multi-weighted contrastive loss.
#
# Inherits:
#   - base_refinement_waveform: Base waveform refinement trainer configuration
#   - model: wavenet (WaveNet model)
#
# Notes:
#   - Number of epochs: 150 (longer training for WaveNet)
#   - Scheduler patience: 6 epochs
#   - Batch size: 32 (optimized for WaveNet architecture)
#   - Early stopping patience: 12 epochs
#   - Fine-tunes from approximation checkpoints
#
# ============================================================================

defaults:
  - base_refinement_waveform
  - /model@model: wavenet
  - _self_


num_epochs: 150
scheduler:
  patience: 6

batch_size: 32

early_stopping:
  patience: 12

# Usage Examples
# ============================================================================
# 1. Basic training:
#    python -m src.train trainer=refinement_trainer_wavenet \
#      train_dataset=train_uci_refinement_abp \
#      checkpoint_managers.load.base_dir=/path/to/approximation/checkpoints
#
# 2. Override direction:
#    python -m src.train trainer=refinement_trainer_wavenet \
#      directions=ecg2abp
#
# 3. Override training parameters:
#    python -m src.train trainer=refinement_trainer_wavenet \
#      num_epochs=200 \
#      batch_size=64 \
#      early_stopping.patience=20
#
# 4. Override checkpoint loading:
#    python -m src.train trainer=refinement_trainer_wavenet \
#      checkpoint_managers.load.base_dir=/custom/path \
#      checkpoint_managers.load.trainer_name=WaveRecApp
# ============================================================================
