# ============================================================================
# MD-ViSCo Refinement Trainer – PulseDB Full (PI / demographics ON)
# ============================================================================
# Identical to refinement_trainer_mdvisco EXCEPT it uses the PulseDB full-feature
# refinement model (mdvisco_refinement_pulsedb), which enables the DistilBERT
# demographic-text-embedding fusion (patient information / PI mode).
#
# Defined as a standalone config (not by inheriting refinement_trainer_mdvisco)
# so the directions / model group overrides compose cleanly off base_refinement_scalar
# without Hydra "Multiple values for <group>" conflicts.
#
# Still set on the command line (mandatory in config.yaml):
#   trainer.use_patient_information=true   # turn demographics on + tag checkpoint path
#
# Usage:
#   torchrun --standalone --nproc_per_node=1 --module src.train -m \
#     trainer=refinement_trainer_mdvisco_pulsedb \
#     trainer.use_patient_information=true \
#     train_dataset=train_pulsedb_refinement_bp test_dataset=test_pulsedb_refinement_bp \
#     train_dataset.dataset_path=<DATA> test_dataset.dataset_path=<DATA>
# ============================================================================

defaults:
  - base_refinement_scalar
  - /model@model: mdvisco_refinement_pulsedb
  - /input_preprocessor@demographics_text_encoder: demographics_text_encoder
  # base_refinement_scalar already selects directions=ppg2abp, so this must use
  # `override` on Hydra 1.3.x (the upstream refinement_trainer_mdvisco omits it and
  # fails to compose with "Multiple values for directions@trainer.directions").
  # Override entries must come after all append entries in the defaults list.
  - override /directions@directions: ppg2bp_ecg2bp
  - _self_

trainer_name: MDViSCoRef

num_epochs: 60

input_preprocessing:
  source:
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "ecg"
      norm: "minmax_zc"
  target:
    - vital: "bp"
      norm: "global_minmax"
  include:
    - bp_raw
    - age_raw
    - gender_raw
    - height_raw
    - weight_raw
    - bmi_raw
