# ============================================================================
# MD-ViSCo Training Configuration
# ============================================================================
#
# Purpose:
#   Main entry point configuration for MD-ViSCo training. Composes base_config
#   and defines default dataset, trainer, and training parameters for model
#   training workflows.
#
# Inherits:
#   - base_config: Base configuration from ConfigStore
#   - train_dataset: Training dataset configuration (default: train_uci)
#   - test_dataset: Test dataset configuration (default: test_uci)
#   - trainer: Trainer configuration (default: approximation_trainer_mdvisco)
#
# Notes:
#   - This is the primary entry point for training scripts
#   - Dataset paths and other required parameters must be provided via CLI
#   - Input preprocessing configuration supports lazy normalization at batch time
#
# ============================================================================

defaults:
  - base_config
  - train_dataset: train_uci  # ← Add dataset defaults
  - test_dataset: test_uci  # ← Add dataset defaults
  - trainer: approximation_trainer_mdvisco
  - _self_

# Common settings removed - all configuration moved to domain-specific configs

# dataset_path / dataset_folder / file_name are provided by the dataset-specific
# configs (e.g. train_pulsedb.yaml, test_pulsedb.yaml, train_uci.yaml ...).
# Override on the CLI to point elsewhere:
#   train_dataset.dataset_path=/absolute/path
# Empty `train_dataset:` / `test_dataset:` blocks must NOT appear under `_self_`
# — they would null out the dataset selected via defaults.

trainer:
  # Logging configuration (moved from common config)
  logging_level: "INFO"
  log_file_path: "training.log"
  resume_training: false
  load_model_weights: false
  direction_mode: ??? # single or multi -- must be set via CLI (see scripts/pulsedb/*.sh)
  strict_loading: true

  # Input preprocessing for lazy normalization at batch time.
  # train.py auto-fills from train_dataset.input_preprocessing when this stays MISSING.
  # See README.md -> Advanced -> Advanced Preprocessing for detailed documentation.
  input_preprocessing: ???

  # CSV file logging is disabled by default; trainers/evaluators write metrics
  # via the progress bar + SwanLab path. Re-enable per run with
  # trainer.progress_bar.csv_wrapper=csv if you want CSV side outputs.
  progress_bar:
    csv_wrapper: null

  # Other knobs (overwrite_checkpoint, use_patient_information,
  # checkpoint_managers.save.base_dir, progress_bar.wandb_wrapper.*) inherit
  # their defaults from the trainer dataclass / yaml chain. Override on the
  # CLI when needed, e.g.:
  #   trainer.overwrite_checkpoint=true
  #   trainer.checkpoint_managers.save.base_dir=/custom/checkpoints
  #   trainer.progress_bar.wandb_wrapper.project_name=MD-ViSCo
  #   trainer.progress_bar.wandb_wrapper.entity=my_team
  #   trainer.progress_bar.wandb_wrapper.wandb_enabled=false  # disable SwanLab logging

# Usage Examples
# ============================================================================
# 1. Basic training command:
#    python src/train.py trainer=approximation_trainer_mdvisco \
#      train_dataset=train_pulsedb \
#      train_dataset.dataset_path=/path/to/data
#
# 2. Override trainer and dataset:
#    python src/train.py trainer=approximation_trainer_nabnet \
#      train_dataset=train_uci \
#      train_dataset.dataset_path=/path/to/uci/data
#
# 3. Override preprocessing configuration:
#    python src/train.py train_dataset=train_pulsedb \
#      trainer.input_preprocessing.source[0].norm=standardize
# ============================================================================