# ============================================================================
# MimicPERFormAF Test Dataset Configuration (1250-sample segments)
# ============================================================================
#
# Purpose:
#   Test dataset configuration for MimicPERFormAF with 1250-sample segments.
#   Inherits base MimicPERFormAF settings and defines test-specific preprocessing
#   and data loading parameters. This file is automatically loaded when
#   dataset=test_mimic_perform_af_1250 is specified.
#
# Inherits:
#   - base_mimicperformaf: Base MimicPERFormAF dataset configuration
#
# Notes:
#   - For BP normalization bounds documentation, see README.md in this directory
#   - Default split: 0% train, 0% validation, 100% test
#   - Supports patient-level splitting
#
# ============================================================================

defaults:
  - base_mimicperformaf
  - _self_

# Canonical channel layout derived from preprocessing-driven mapping
input_preprocessing:
  source:
    - vital: "ecg"
      norm: "raw"
    - vital: "ppg"
      norm: "raw"
  target:
    - vital: "ppg"
      norm: "raw"

# The actual configuration values will be loaded from MimicPERFormAFConfig defaults
# You can override any values here if needed

input_size: 1250  # 1250-sample segments (matches train config and filename)

dataset_path: ???  # Must be provided via CLI or environment variable
file_name: 'MimicPERFormAF_1250_merged_test.h5'
train_ratio: 0.00
val_ratio: 0.00
test_ratio: 1.00

# Splitting strategy flags moved from common config
use_patient_split: true  # This dataset supports patient-level splitting

# Usage Examples
# ============================================================================
# 1. Reference in test/evaluator configs via Hydra defaults:
#    defaults:
#      - test_dataset: test_mimic_perform_af_1250
#
# 2. Command line override:
#    python -m src.test evaluator=blood_pressure_evaluator \
#      test_dataset=test_mimic_perform_af_1250 \
#      test_dataset.dataset_path=/path/to/mimic/data
#
# 3. Override preprocessing if needed:
#    python -m src.test test_dataset=test_mimic_perform_af_1250 \
#      test_dataset.input_preprocessing.source[0].norm=standardize
# ============================================================================
