# ============================================================================
# PulseDB Test Dataset Configuration
# ============================================================================
#
# Purpose:
#   Test dataset configuration for PulseDB. Inherits base PulseDB settings
#   and defines test-specific preprocessing and data loading parameters.
#   This file is automatically loaded when dataset=pulsedb is specified.
#
# Inherits:
#   - base_pulsedb: Base PulseDB dataset configuration
#
# Notes:
#   - For BP normalization bounds documentation, see README.md in this directory
#   - PulseDB BP range: DBP 2.34 mmHg, SBP up to 286.58 mmHg
#   - Default split: 0% train, 0% validation, 100% test
#
# ============================================================================

defaults:
  - base_pulsedb
  - _self_

# Canonical channel layout derived from preprocessing-driven mapping
input_preprocessing:
  source:
    - vital: "ecg"
      norm: "minmax_zc"
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "abp"
      norm: "minmax_zc"
  target:
    - vital: "ecg"
      norm: "minmax_zc"
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "abp"
      norm: "minmax_zc"
  include:
    - bp_raw

# The actual configuration values will be loaded from PulseDBConfig defaults
# You can override any values here if needed

# Resolve to <project_root>/data so the path stays correct after Hydra
# chdir's into outputs/.../ . `${hydra:runtime.cwd}` returns the directory
# torchrun was invoked from — keep launching commands from the project root.
dataset_path: ${hydra:runtime.cwd}/data
file_name: "CalFree_Test_Subset.h5"
train_ratio: 0.00
val_ratio: 0.00
test_ratio: 1.00

# Usage Examples
# ============================================================================
# 1. Reference in test/evaluator configs via Hydra defaults:
#    defaults:
#      - test_dataset: test_pulsedb
#
# 2. Command line override:
#    python -m src.test evaluator=blood_pressure_evaluator \
#      test_dataset=test_pulsedb \
#      test_dataset.dataset_path=/path/to/pulsedb/data
#
# 3. Override preprocessing if needed:
#    python -m src.test test_dataset=test_pulsedb \
#      test_dataset.input_preprocessing.source[0].norm=standardize
# ============================================================================