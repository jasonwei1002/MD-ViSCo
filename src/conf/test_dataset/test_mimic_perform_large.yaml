# ============================================================================
# MimicPERFormLarge Test Dataset Configuration
# ============================================================================
#
# Purpose:
#   Test dataset configuration for MimicPERFormLarge. Inherits base MimicPERFormLarge
#   settings and defines test-specific preprocessing and data loading parameters.
#   This file is automatically loaded when dataset=mimic_perform_large is specified.
#
# Inherits:
#   - base_mimicperformlarge: Base MimicPERFormLarge dataset configuration
#
# Notes:
#   - For BP normalization bounds documentation, see README.md in this directory
#   - Default split: 0% train, 0% validation, 100% test
#
# ============================================================================

defaults:
  - base_mimicperformlarge
  - _self_

# Canonical channel layout derived from preprocessing-driven mapping
input_preprocessing:
  source:
    - vital: "ecg"
      norm: "raw"
    - vital: "ppg"
      norm: "raw"
    - vital: "imp"
      norm: "raw"
  target:
    - vital: "ppg"
      norm: "raw"

# The actual configuration values will be loaded from MimicPERFormLargeConfig defaults
# You can override any values here if needed

input_size: 4000  # Real override (differs from default 4001)

dataset_path: ???  # Must be provided via CLI or environment variable
file_name: "MimicPERFormLarge_test.h5"
train_ratio: 0.00
val_ratio: 0.00
test_ratio: 1.00

# Usage Examples
# ============================================================================
# 1. Reference in test/evaluator configs via Hydra defaults:
#    defaults:
#      - test_dataset: test_mimic_perform_large
#
# 2. Command line override:
#    python -m src.test evaluator=blood_pressure_evaluator \
#      test_dataset=test_mimic_perform_large \
#      test_dataset.dataset_path=/path/to/mimic/data
#
# 3. Override preprocessing if needed:
#    python -m src.test test_dataset=test_mimic_perform_large \
#      test_dataset.input_preprocessing.source[0].norm=standardize
# ============================================================================
