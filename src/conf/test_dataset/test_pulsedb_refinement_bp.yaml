# ============================================================================
# PulseDB Test Dataset Configuration for Scalar BP Regression
# ============================================================================
#
# Purpose:
#   Test dataset configuration for PulseDB scalar BP regression (target: BP only).
#   Inherits base PulseDB settings and defines test-specific preprocessing and
#   data loading parameters for scalar regression evaluators.
#
# Inherits:
#   - base_pulsedb: Base PulseDB dataset configuration
#
# Notes:
#   - For BP normalization bounds documentation, see README.md in this directory
#   - Target: BP scalar only (for scalar regression trainers like PatchTST, NABNet)
#   - Default split: 0% train, 0% validation, 100% test
#
# ============================================================================

defaults:
  - base_pulsedb
  - _self_

# Canonical channel layout derived from preprocessing-driven mapping
# Target: BP scalar only (for scalar regression trainers like PatchTST, NABNet)
input_preprocessing:
  source:
    - vital: "ecg"
      norm: "minmax_zc"
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "abp"
      norm: "minmax_zc"
  target:
    - vital: "bp"
      norm: "global_minmax"
  include:
    - bp_raw
    - age_raw
    - gender_raw
    - height_raw
    - weight_raw
    - bmi_raw

# The actual configuration values will be loaded from PulseDBConfig defaults
# You can override any values here if needed

dataset_path: ???  # Must be provided via CLI or environment variable
file_name: "CalFree_Test_Subset.h5"
train_ratio: 0.0
val_ratio: 0.0
test_ratio: 1.0

# Usage Examples
# ============================================================================
# 1. Reference in test/evaluator configs via Hydra defaults:
#    defaults:
#      - test_dataset: test_pulsedb_refinement_bp
#
# 2. Command line override:
#    python -m src.test evaluator=blood_pressure_evaluator \
#      test_dataset=test_pulsedb_refinement_bp \
#      test_dataset.dataset_path=/path/to/pulsedb/data
#
# 3. Override preprocessing if needed:
#    python -m src.test test_dataset=test_pulsedb_refinement_bp \
#      test_dataset.input_preprocessing.source[0].norm=standardize
# ============================================================================

