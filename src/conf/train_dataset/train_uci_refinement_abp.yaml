# ============================================================================
# UCI Training Dataset Configuration for Waveform ABP Reconstruction
# ============================================================================
#
# Purpose:
#   Training dataset configuration for UCI waveform ABP reconstruction (target: ABP only).
#   Inherits base UCI settings and defines training-specific preprocessing and
#   data loading parameters for waveform reconstruction trainers.
#
# Inherits:
#   - base_uci: Base UCI dataset configuration
#
# Notes:
#   - BP normalization: dbp_min and sbp_max define the dataset's BP value ranges used for
#     denormalization during inference. These values are automatically sourced from the base
#     dataset config (base_uci) and used by processors to convert normalized predictions back
#     to mmHg. UCI: DBP range 50.0 mmHg, SBP range up to 189.98 mmHg
#   - Target: ABP waveform only (for waveform reconstruction trainers like WaveNet, PPG2ABP)
#   - Default split: 81% train, 9% validation, 10% test
#
# ============================================================================

defaults:
  - base_uci
  - _self_

# Target: ABP waveform only (for waveform reconstruction trainers like WaveNet, PPG2ABP)
input_preprocessing:
  source:
    - vital: "ecg"
      norm: "minmax_zc"
    - vital: "ppg"
      norm: "minmax_zc"
    - vital: "abp"
      norm: "minmax_zc"
  target:
    - vital: "abp"
      norm: "global_minmax"
  include:
    - bp_raw

dataset_path: ???
file_name: 'train.h5'
train_ratio: 0.81
val_ratio: 0.09
test_ratio: 0.1

# Usage Examples
# ============================================================================
# 1. Reference in trainer configs via Hydra defaults:
#    defaults:
#      - train_dataset: train_uci_refinement_abp
#
# 2. Command line override:
#    python src/train.py trainer=approximation_trainer_nabnet \
#      train_dataset=train_uci_refinement_abp \
#      train_dataset.dataset_path=/path/to/uci/data
#
# 3. Override preprocessing or split ratios:
#    python src/train.py train_dataset=train_uci_refinement_abp \
#      train_dataset.train_ratio=0.75 \
#      train_dataset.val_ratio=0.25
# ============================================================================

