# ============================================================================
# Base PulseDB Dataset Configuration
# ============================================================================
#
# Purpose:
#   Base configuration providing default values for PulseDB dataset configs.
#   Defines dataset-specific parameters including BP value ranges, input size,
#   and splitting strategies.
#
# Base:
#   - _target_: src.dataset.pulsedb_dataset.PulseDBDataset
#
# Notes:
#   - PulseDB BP range: DBP 2.34 mmHg, SBP up to 286.58 mmHg
#   - Input size: 1280 samples (controls automatic padding/trimming)
#   - Default split: 80% train, 20% validation, 0% test
#
# ============================================================================

_target_: src.dataset.pulsedb_dataset.PulseDBDataset
dataset_name: PulseDB

# Vitals available in this dataset (used by direction capability checks).
# Channel index values are not consumed by any downstream logic (each waveform
# tensor is stored single-channel and direction checks only test key presence),
# but VitalsDataset enforces uniqueness, so assign distinct integers per vital.
vitals_dataset:
  _target_: src.dataset.base_dataset.VitalsDataset
  channels:
    ECG: 0
    PPG: 1
    ABP: 2
    BP: 3

# Input size for models (controls automatic padding/trimming)
input_size: 1280

# PulseDB BP value ranges (for BP denormalization)
# PulseDB: DBP range 2.34 mmHg, SBP range up to 286.58 mmHg
dbp_min: 2.341260731456743
sbp_max: 286.58240014784946

# File path structure
# Local data layout: <project_root>/data/pulsedb/{Train_Subset,CalFree_Test_Subset}.h5
dataset_folder: pulsedb

# Dataset splitting configuration
# All ratios must be between 0.0 and 1.0, and must sum to 1.0
train_ratio: 0.80
val_ratio: 0.20
test_ratio: 0.0

# Splitting strategy flags
use_patient_split: false
use_nabnet_vanilla_split: false

# Trimming strategy (only used when trimming is needed)
trim_strategy: center

# Usage Examples
# ============================================================================
# 1. Inherit in dataset configs via Hydra defaults:
#    defaults:
#      - base_pulsedb
#      - _self_
#
# 2. Override specific parameters:
#    python src/train.py train_dataset=train_pulsedb \
#      train_dataset.train_ratio=0.75 \
#      train_dataset.val_ratio=0.25
#
# 3. Override BP bounds (if needed):
#    python src/train.py train_dataset=train_pulsedb \
#      train_dataset.dbp_min=0.0 \
#      train_dataset.sbp_max=300.0
# ============================================================================
