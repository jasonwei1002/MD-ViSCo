name: mdvisco
# Linux + CUDA environment file.
#
# Python version note:
#   The MD-ViSCo source uses PEP 701 multi-line f-strings (Python 3.12+),
#   so this env pins python=3.12. As a side effect the scientific stack
#   (numpy/scipy/pandas/sklearn) is bumped to versions with py312 wheels —
#   the original 1.x/1.4 pins were py310-only.
#
#   numpy-base is dropped in favor of plain numpy. With py3.12 the conda-forge
#   stack uses MKL via the meta-package, so explicitly listing numpy-base
#   alongside mkl is no longer necessary (and numpy-base lags on py3.12 wheels).
#
# Usage:
#   conda env create -f environment.yml
#   conda activate mdvisco
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python environment
  - python=3.12
  - pip

  # PyTorch and CUDA
  - pytorch=2.5
  - torchvision=0.20
  - torchaudio=2.5
  - pytorch-cuda=12.1
  - cuda-cudart
  - cuda-libraries
  - cuda-runtime

  # Scientific computing (versions chosen for py3.12 wheels)
  - numpy=1.26
  - scipy=1.11
  - pandas=2.2
  - scikit-learn=1.4
  - h5py
  - mkl

  # Deep learning frameworks
  - transformers=4.39
  - tokenizers=0.15
  - safetensors=0.4
  - timm=1.0
  - einops=0.8

  # Configuration and utilities
  - hydra-core=1.3
  - omegaconf=2.3
  - tqdm=4.64
  - seaborn=0.13
  - fsspec

  # Signal processing
  - neurokit2

  # Data utilities
  - dotmap=1.3
  - mat73=0.62

  # Transitive deps for pyppg — install from conda-forge so pip does NOT
  # try to compile gevent from source (old gevent's Cython sources reference
  # Python 2 `long` and break on modern Cython).
  - gevent>=23
  - greenlet

  # Development tools
  - pytest=8.4
  - black=24.1
  - isort=5.13
  - autopep8
  - autoflake
  - docformatter
  - ruff
  - flake8=7.0
  - flake8-bugbear
  - flake8-comprehensions
  - flake8-docstrings
  - flake8-pyproject
  - mypy=1.8
  - pyright

  # Pip-only packages
  # `--prefer-binary` tells pip to use wheels whenever a wheel exists for the
  # current platform/Python, preventing further "compile from source" surprises
  # similar to the gevent failure above.
  #
  # pyppg 1.0.73 ships lockfile-style hard pins (scipy==1.9.1, numpy==1.23.2,
  # pandas==1.4.4, gevent==21.12.0, ...) that conflict with the py3.12 stack
  # above. Install with --no-deps; the actually-imported APIs (pyPPG.preproc,
  # Fiducials, pack_ppg._ErrorHandler) work fine against the bumped stack.
  - pip:
      - --prefer-binary
      - --no-deps
      - pyppg==1.0.73
  # NOTE: swanlab is the experiment tracker for src/loggings/wandb_wrapper.py
  # (despite the legacy module name). It cannot live in the pip block above
  # because the --no-deps flag would also strip swanlab's transitive deps.
  # Install it after the env is created:
  #   pip install swanlab
