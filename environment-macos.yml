name: mdvisco
# macOS environment file (Apple Silicon / Intel).
#
# Differences vs environment.yml (Linux + CUDA):
#   - No nvidia channel; no pytorch-cuda / cuda-* packages (CUDA does not run on macOS).
#   - Use conda-forge for everything; pytorch packages are sourced from conda-forge
#     because the official pytorch channel ships only CPU/MPS builds for osx-arm64
#     and conda-forge mirrors them with consistent metadata.
#   - Drop mkl and numpy-base (Intel-only and unavailable on osx-arm64). Replace
#     numpy-base with plain numpy; on Apple Silicon BLAS goes through Accelerate.
#   - GPU acceleration on Apple Silicon is provided by PyTorch's MPS backend
#     (use device "mps"). Verify with:
#         python -c "import torch; print(torch.backends.mps.is_available())"
#
# Python version note:
#   The MD-ViSCo source uses PEP 701 multi-line f-strings (Python 3.12+),
#   so this env pins python=3.12. As a side effect the scientific stack
#   (numpy/scipy/pandas/sklearn) is bumped to versions with osx-arm64 +
#   py312 wheels — the original 1.x/1.4 pins were py310-only.
#
# Usage:
#   conda env create -f environment-macos.yml
#   conda activate mdvisco
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core Python environment
  - python=3.12
  - pip

  # PyTorch (CPU + MPS on macOS; no CUDA)
  - pytorch=2.5
  - torchvision=0.20
  - torchaudio=2.5

  # Scientific computing (versions chosen for py3.12 + osx-arm64 wheels)
  - numpy=1.26
  - scipy=1.11
  - pandas=2.2
  - scikit-learn=1.4
  - h5py

  # Deep learning frameworks
  - transformers=4.39
  - tokenizers=0.15
  - safetensors=0.4
  - timm=1.0
  - einops=0.8

  # Configuration and utilities
  - hydra-core=1.3
  - omegaconf=2.3
  - tqdm=4.64
  - seaborn=0.13
  - fsspec

  # Signal processing
  - neurokit2

  # Data utilities
  - dotmap=1.3
  - mat73=0.62

  # Transitive deps for pyppg — install from conda-forge so pip does NOT
  # try to compile gevent from source (old gevent's Cython sources reference
  # Python 2 `long` and break on modern Cython).
  - gevent>=23
  - greenlet

  # Development tools
  - pytest=8.4
  - black=24.1
  - isort=5.13
  - autopep8
  - autoflake
  - docformatter
  - ruff
  - flake8=7.0
  - flake8-bugbear
  - flake8-comprehensions
  - flake8-docstrings
  - flake8-pyproject
  - mypy=1.8
  - pyright

  # Pip-only packages
  # `--prefer-binary` tells pip to use wheels whenever a wheel exists for the
  # current platform/Python, preventing further "compile from source" surprises
  # similar to the gevent failure above.
  - pip:
      - --prefer-binary
      - pyppg==1.0.73
      - swanlab
